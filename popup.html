<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Patient Mapper v3.5.1</title>
        <script src="/src/js/beacon.js"></script>
        <script src="/src/js/lib/tailwind.min.js"></script>
        <script src="/src/js/lib/lz-string.min.js"></script>
        <script src="/src/js/lib/sweetalert2.all.min.js"></script>
        <script src="/src/js/lib/firebase-app-compat.js"></script>
        <script src="/src/js/lib/firebase-database-compat.js"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/src/css/popup.css" />
    </head>
    <body class="antialiased">
        <div id="main-container">
            <div class="flex h-full w-full">
                <aside
                    id="sidebar"
                    class="w-56 bg-white border-r border-slate-200 flex flex-col flex-shrink-0 relative transition-[width] duration-300 ease-in-out"
                >
                    <div
                        class="p-4 flex items-center gap-3 border-b border-slate-50 relative"
                    >
                        <div
                            class="w-7 h-7 rounded bg-blue-600 flex items-center justify-center flex-shrink-0"
                        >
                            <span class="text-white font-bold text-[10px]"
                                >PM</span
                            >
                        </div>
                        <h1
                            id="sidebar-brand-text"
                            class="text-sm font-bold text-slate-800 tracking-tight brand-text whitespace-nowrap transition-opacity duration-200 overflow-hidden"
                        >
                            Patient Mapper
                        </h1>
                        <button
                            id="sidebar-toggle-btn"
                            class="absolute -right-3 top-5 w-6 h-6 bg-white border border-slate-200 rounded-full flex items-center justify-center hover:bg-slate-50 z-10 shadow-sm cursor-pointer"
                        >
                            <svg
                                id="sidebar-toggle-icon"
                                class="w-3 h-3 text-slate-400 transition-transform duration-300"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M15 19l-7-7 7-7"
                                />
                            </svg>
                        </button>
                    </div>
                    <div class="p-4 space-y-3 rounded-lg shadow-md">
                        <div class="flex items-center gap-3">
                            <div
                                id="sidebar-user-avatar"
                                class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-slate-200 font-semibold text-slate-600 transition shadow-sm text-xs"
                            >
                                -
                            </div>
                            <div
                                class="sidebar-text flex flex-col overflow-hidden transition-opacity duration-200"
                            >
                                <span
                                    class="text-[10px] text-slate-400 font-medium"
                                    >Logged in as</span
                                >
                                <span
                                    id="sidebar-user-name"
                                    class="truncate text-xs font-semibold text-slate-700"
                                    >Checking...</span
                                >
                                <div class="mt-0.5 flex items-center gap-1.5">
                                    <span
                                        id="sidebar-status-indicator"
                                        class="h-1.5 w-1.5 rounded-full bg-slate-400"
                                    ></span>
                                    <span
                                        id="sidebar-status-text"
                                        class="text-[10px] font-medium text-slate-500"
                                        >Connecting...</span
                                    >
                                </div>
                            </div>
                        </div>
                        <div
                            class="sidebar-text transition-opacity duration-200"
                        >
                            <button
                                id="sidebar-auth-btn"
                                class="flex w-full items-center justify-center gap-1.5 rounded-md bg-slate-50 hover:bg-slate-100 px-2.5 py-1.5 text-[10px] font-semibold text-slate-600 border border-slate-200 cursor-pointer transition"
                            >
                                <svg
                                    id="sidebar-auth-btn-icon"
                                    class="h-3 w-3 hidden"
                                    fill="none"
                                    viewBox="0 0 24 24"
                                    stroke="currentColor"
                                >
                                    <path
                                        stroke-linecap="round"
                                        stroke-linejoin="round"
                                        stroke-width="2"
                                        d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"
                                    />
                                </svg>
                                <div class="flex items-center space-x-2">
                                    <div
                                        id="sidebar-auth-btn-loading-icon"
                                        class="w-3 h-3 border-3 border-gray-300 border-t-indigo-600 rounded-full animate-spin"
                                    ></div>
                                    <span id="sidebar-auth-btn-text"
                                        >Detecting...</span
                                    >
                                </div>
                            </button>
                        </div>
                        <div
                            class="sidebar-text space-y-2.5 transition-opacity duration-200"
                        >
                            <div>
                                <label
                                    for="target-hospital-select"
                                    class="block text-[9px] font-bold uppercase tracking-wider text-slate-400 mb-0.5"
                                    >Target Hospital</label
                                >
                                <select
                                    id="target-hospital-select"
                                    class="w-full text-[11px] bg-slate-50 border border-slate-200 rounded-md p-1.5 pe-4 font-medium text-slate-700 outline-none focus:border-blue-500 transition"
                                ></select>
                            </div>
                            <div>
                                <label
                                    for="target-domain-select"
                                    class="block text-[9px] font-bold uppercase tracking-wider text-slate-400 mb-0.5"
                                    >Target Domain</label
                                >
                                <select
                                    id="target-domain-select"
                                    class="w-full text-[11px] bg-slate-50 border border-slate-200 rounded-md p-1.5 pe-4 font-medium text-slate-700 outline-none focus:border-blue-500 transition"
                                ></select>
                            </div>
                        </div>
                    </div>
                    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
                        <button
                            id="sidebar-all-patients"
                            class="nav-item w-full flex items-center px-3 py-2 text-xs font-semibold text-blue-600 bg-blue-50 rounded-lg transition-all cursor-pointer"
                        >
                            <svg
                                class="w-4 h-4 flex-shrink-0 mr-3"
                                fill="none"
                                stroke="currentColor"
                                viewBox="0 0 24 24"
                            >
                                <path
                                    stroke-linecap="round"
                                    stroke-linejoin="round"
                                    stroke-width="2"
                                    d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"
                                />
                            </svg>
                            <span class="nav-text whitespace-nowrap"
                                >All Patients</span
                            >
                        </button>

                        <div class="space-y-1">
                            <div
                                class="w-full flex items-center justify-between rounded-lg hover:bg-slate-50 transition-all group"
                            >
                                <button
                                    id="sidebar-my-patients"
                                    class="nav-item flex-1 flex items-center px-3 py-2 text-xs font-semibold text-slate-500 hover:text-slate-900 transition-all cursor-pointer min-w-0"
                                >
                                    <div
                                        class="flex items-center w-full min-w-0"
                                    >
                                        <div class="relative flex-shrink-0">
                                            <svg
                                                class="w-4 h-4"
                                                fill="none"
                                                stroke="currentColor"
                                                viewBox="0 0 24 24"
                                            >
                                                <path
                                                    stroke-linecap="round"
                                                    stroke-linejoin="round"
                                                    stroke-width="2"
                                                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"
                                                />
                                            </svg>
                                            <span
                                                id="sidebar-my-patients-collapsed-badge"
                                                class="hidden absolute -top-1.5 -right-2 bg-blue-600 text-white rounded-full px-1 text-[7px] font-black scale-90 border border-white"
                                                >0</span
                                            >
                                        </div>
                                        <span
                                            class="nav-text ml-3 whitespace-nowrap truncate"
                                            >My Patients</span
                                        >
                                        <span
                                            id="sidebar-my-patients-badge"
                                            class="nav-text ml-auto mr-1 bg-blue-600 text-white px-1.5 py-0.5 rounded-md text-[9px] font-black border border-blue-700 shadow-sm transition-all"
                                            >0</span
                                        >
                                    </div>
                                </button>
                                <button
                                    id="sidebar-my-patients-accordion-btn"
                                    type="button"
                                    class="p-2 mr-1 rounded-md text-slate-400 hover:bg-slate-200/60 hover:text-slate-600 transition-all cursor-pointer"
                                >
                                    <svg
                                        id="sidebar-my-patients-accordion-arrow"
                                        class="nav-text h-3 w-3 transform transition-transform duration-200 flex-shrink-0 -rotate-90"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke="currentColor"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M19 9l-7 7-7-7"
                                        />
                                    </svg>
                                </button>
                            </div>

                            <div
                                id="sidebar-my-patients-accordion-content"
                                class="space-y-1 pl-3 overflow-y-auto no-scrollbar transition-all duration-200 max-h-0"
                            >
                                <button
                                    id="sidebar-my-patients-add-btn"
                                    class="flex w-full items-center gap-1.5 rounded-md px-3 py-1.5 text-[11px] font-medium text-blue-600 hover:bg-blue-50 cursor-pointer transition"
                                >
                                    <svg
                                        class="h-3 w-3"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke="currentColor"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M12 4v16m8-8H4"
                                        />
                                    </svg>
                                    <span>Add New List</span>
                                </button>
                                <div
                                    id="sidebar-my-patients-lists-container"
                                    class="space-y-1"
                                ></div>
                            </div>

                            <div
                                class="w-full flex items-center justify-between rounded-lg hover:bg-slate-50 transition-all group"
                            >
                                <button
                                    id="sidebar-tools"
                                    class="nav-item flex-1 flex items-center px-3 py-2 text-xs font-semibold text-slate-500 hover:text-slate-900 transition-all cursor-pointer min-w-0"
                                >
                                    <div
                                        class="flex items-center w-full min-w-0"
                                    >
                                        <div class="relative flex-shrink-0">
                                            <svg
                                                class="w-4 h-4"
                                                fill="none"
                                                stroke="currentColor"
                                                viewBox="0 0 24 24"
                                            >
                                                <path
                                                    stroke-linecap="round"
                                                    stroke-linejoin="round"
                                                    stroke-width="2"
                                                    d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
                                                />
                                            </svg>
                                        </div>
                                        <span
                                            class="nav-text ml-3 whitespace-nowrap truncate"
                                            >More Options</span
                                        >
                                    </div>
                                </button>
                                <button
                                    id="sidebar-tools-accordion-btn"
                                    type="button"
                                    class="p-2 mr-1 rounded-md text-slate-400 hover:bg-slate-200/60 hover:text-slate-600 transition-all cursor-pointer"
                                >
                                    <svg
                                        id="sidebar-tools-accordion-arrow"
                                        class="nav-text h-3 w-3 transform transition-transform duration-200 flex-shrink-0 -rotate-90"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke="currentColor"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M19 9l-7 7-7-7"
                                        />
                                    </svg>
                                </button>
                            </div>

                            <div
                                id="sidebar-tools-accordion-content"
                                class="space-y-1 pl-3 overflow-y-auto no-scrollbar transition-all duration-200 max-h-0"
                            >
                                <button
                                    id="sidebar-calculator"
                                    class="nav-item w-full flex items-center px-3 py-1.5 text-[11px] font-medium text-slate-500 hover:bg-slate-50 hover:text-slate-900 rounded-md transition-all cursor-pointer"
                                >
                                    <span
                                        class="nav-text whitespace-nowrap truncate"
                                        >Calculator</span
                                    >
                                </button>
                                <button
                                    id="sidebar-templates"
                                    class="nav-item w-full flex items-center px-3 py-1.5 text-[11px] font-medium text-slate-500 hover:bg-slate-50 hover:text-slate-900 rounded-md transition-all cursor-pointer"
                                >
                                    <span
                                        class="nav-text whitespace-nowrap truncate"
                                        >Templates</span
                                    >
                                </button>
                                <button
                                    id="sidebar-dev-mode"
                                    class="nav-item w-full flex items-center px-3 py-1.5 text-[11px] font-medium text-slate-500 hover:bg-slate-50 hover:text-slate-900 rounded-md transition-all cursor-pointer"
                                >
                                    <span
                                        class="nav-text whitespace-nowrap truncate"
                                        >Developer Mode</span
                                    >
                                </button>
                                <button
                                    id="sidebar-check-releases"
                                    class="nav-item w-full flex items-center px-3 py-1.5 text-[11px] font-medium text-slate-500 hover:bg-slate-50 hover:text-slate-900 rounded-md transition-all cursor-pointer"
                                >
                                    <span
                                        class="nav-text whitespace-nowrap truncate"
                                        >Check New Releases</span
                                    >
                                </button>
                            </div>
                        </div>
                    </nav>
                </aside>
                <main class="flex-1 flex-col bg-slate-50 overflow-hidden">
                    <div id="all-patients-container" class="h-full"></div>
                    <div id="my-patients-container" class="h-full"></div>
                </main>
            </div>
        </div>
        <script type="module" src="/src/js/popup.js"></script>
    </body>
</html>
